name: Auto Sync Regional Job Data
on:
  schedule:
    # 기존 khoon77/job-portal과 동일하게 5분마다 실행
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  sync-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Create Firebase credentials
        env:
          FIREBASE_CREDENTIALS_BASE64: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
        run: echo "$FIREBASE_CREDENTIALS_BASE64" | base64 --decode > firebase-service-account.json
      - name: Sync new regional jobs
        env:
          NARAITEO_API_KEY: ${{ secrets.NARAITEO_API_KEY }}
          FIREBASE_CREDENTIALS_FILE: firebase-service-account.json
          TZ: Asia/Seoul
        run: python auto_sync_scheduler.py
      - name: Remove credentials
        if: always()
        run: rm -f firebase-service-account.json
