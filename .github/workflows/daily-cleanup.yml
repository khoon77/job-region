name: Daily Regional Data Cleanup
on:
  schedule:
    # KST 00:00 = UTC 15:00
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Create Firebase credentials
        env:
          FIREBASE_CREDENTIALS_BASE64: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
        run: echo "$FIREBASE_CREDENTIALS_BASE64" | base64 --decode > firebase-service-account.json
      - name: Cleanup old regional jobs
        env:
          FIREBASE_CREDENTIALS_FILE: firebase-service-account.json
          TZ: Asia/Seoul
        run: python data_cleanup.py
      - name: Remove credentials
        if: always()
        run: rm -f firebase-service-account.json
